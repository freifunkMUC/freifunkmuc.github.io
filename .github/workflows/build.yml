name: Build

on:
  pull_request:
  push:

# Minimal permissions needed for building
permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Prevent hanging jobs

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false # Safer for pull requests

      - name: Cache Ruby gems
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-

      - name: Set up Ruby environment
        uses: ruby/setup-ruby@0dafeac902942906541bc140009cdbf32665b601 # v1.315.0
        with:
          ruby-version: "3.2"
          bundler-cache: true
          cache-version: 0 # Allows cache invalidation if needed

      - name: Install dependencies
        run: bundle install --jobs $(nproc) --retry 3 --path vendor/bundle

      - name: Build Jekyll site
        run: bundle exec jekyll build --trace

      - name: Verify _site directory
        run: |
          [ -d "_site" ] || exit 1
          ls -al _site
